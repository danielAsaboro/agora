[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
arc_testnet = "${RPC}"

[etherscan]
arc_testnet = { key = "${EXPLORER_KEY}", url = "${EXPLORER_URL}" }
